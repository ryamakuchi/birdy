name: CI
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    name: lint and test check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: cache
        uses: actions/cache@v1
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: yarn install
        run: yarn install --pure-lockfile
      - name: Run eslint
        run: yarn lint
      - name: Run test
        run: yarn test
